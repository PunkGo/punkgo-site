<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'JetBrains Mono', 'Consolas', monospace">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="b">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="340" fill="#0d1117" rx="4"/>

  <text x="300" y="28" fill="#00d4ff" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">INCLUSION PROOF: "e5 IS IN THE LOG"</text>

  <!-- 8-leaf Merkle tree -->
  <!-- Root (level 0) -->
  <circle cx="300" cy="70" r="16" fill="none" stroke="#39ff14" stroke-width="2" filter="url(#g)"/>
  <text x="300" y="74" fill="#39ff14" font-size="8" text-anchor="middle" font-weight="bold">root</text>

  <!-- Level 1 -->
  <line x1="288" y1="86" x2="200" y2="120" stroke="#444" stroke-width="1.5"/>
  <line x1="312" y1="86" x2="400" y2="120" stroke="#00d4ff" stroke-width="2" filter="url(#b)"/>
  <circle cx="200" cy="130" r="13" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#b)"/>
  <text x="200" y="134" fill="#00d4ff" font-size="7" text-anchor="middle">h0-3</text>
  <text x="200" y="155" fill="#00d4ff" font-size="8" text-anchor="middle">GIVEN</text>
  <circle cx="400" cy="130" r="13" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="400" y="134" fill="#888" font-size="7" text-anchor="middle">h4-7</text>

  <!-- Level 2 -->
  <line x1="192" y1="143" x2="150" y2="175" stroke="#444" stroke-width="1"/>
  <line x1="208" y1="143" x2="250" y2="175" stroke="#444" stroke-width="1"/>
  <line x1="392" y1="143" x2="350" y2="175" stroke="#00d4ff" stroke-width="1.5" filter="url(#b)"/>
  <line x1="408" y1="143" x2="450" y2="175" stroke="#444" stroke-width="1.5"/>

  <circle cx="150" cy="185" r="11" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <text x="150" y="189" fill="#666" font-size="6" text-anchor="middle">h0-1</text>
  <circle cx="250" cy="185" r="11" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <text x="250" y="189" fill="#666" font-size="6" text-anchor="middle">h2-3</text>
  <circle cx="350" cy="185" r="11" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#b)"/>
  <text x="350" y="189" fill="#00d4ff" font-size="6" text-anchor="middle">h4-5</text>
  <circle cx="450" cy="185" r="11" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <text x="450" y="189" fill="#666" font-size="6" text-anchor="middle">h6-7</text>

  <!-- Level 3 (leaves) -->
  <line x1="344" y1="196" x2="325" y2="218" stroke="#444" stroke-width="1"/>
  <line x1="356" y1="196" x2="375" y2="218" stroke="#00d4ff" stroke-width="1.5" filter="url(#b)"/>
  <line x1="444" y1="196" x2="425" y2="218" stroke="#444" stroke-width="1"/>
  <line x1="456" y1="196" x2="475" y2="218" stroke="#444" stroke-width="1"/>

  <!-- Leaf e4 - given hash -->
  <rect x="310" y="222" width="30" height="22" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#b)"/>
  <text x="325" y="237" fill="#00d4ff" font-size="8" text-anchor="middle">e4</text>
  <text x="325" y="256" fill="#00d4ff" font-size="8" text-anchor="middle">GIVEN</text>

  <!-- Leaf e5 - the target -->
  <rect x="360" y="222" width="30" height="22" rx="2" fill="#39ff14" fill-opacity="0.15" stroke="#39ff14" stroke-width="2" filter="url(#g)"/>
  <text x="375" y="237" fill="#39ff14" font-size="8" text-anchor="middle" font-weight="bold">e5</text>
  <text x="375" y="256" fill="#39ff14" font-size="8" text-anchor="middle">TARGET</text>

  <!-- Dim leaves -->
  <rect x="410" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <text x="425" y="237" fill="#666" font-size="8" text-anchor="middle">e6</text>
  <rect x="460" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <text x="475" y="237" fill="#666" font-size="8" text-anchor="middle">e7</text>

  <!-- Also dim left leaves -->
  <line x1="144" y1="196" x2="125" y2="218" stroke="#444" stroke-width="1" opacity="0.3"/>
  <line x1="156" y1="196" x2="175" y2="218" stroke="#444" stroke-width="1" opacity="0.3"/>
  <line x1="244" y1="196" x2="225" y2="218" stroke="#444" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="196" x2="275" y2="218" stroke="#444" stroke-width="1" opacity="0.3"/>
  <rect x="110" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.3"/>
  <text x="125" y="237" fill="#666" font-size="8" text-anchor="middle" opacity="0.4">e0</text>
  <rect x="160" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.3"/>
  <text x="175" y="237" fill="#666" font-size="8" text-anchor="middle" opacity="0.4">e1</text>
  <rect x="210" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.3"/>
  <text x="225" y="237" fill="#666" font-size="8" text-anchor="middle" opacity="0.4">e2</text>
  <rect x="260" y="222" width="30" height="22" rx="2" fill="none" stroke="#444" stroke-width="1" opacity="0.3"/>
  <text x="275" y="237" fill="#666" font-size="8" text-anchor="middle" opacity="0.4">e3</text>

  <!-- Legend -->
  <rect x="120" y="290" width="360" height="36" rx="3" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <circle cx="150" cy="308" r="5" fill="#00d4ff" opacity="0.6"/>
  <text x="162" y="312" fill="#00d4ff" font-size="9">= proof path (3 hashes)</text>
  <circle cx="330" cy="308" r="5" fill="#39ff14" opacity="0.6"/>
  <text x="342" y="312" fill="#39ff14" font-size="9">= target leaf</text>

  <!-- Annotation -->
  <text x="300" y="335" fill="#666" font-size="9" text-anchor="middle">8 events in log, only 3 hashes needed to verify e5  =  O(log n)</text>
</svg>
