<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="'JetBrains Mono', 'Consolas', monospace">
  <defs>
    <filter id="gg">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="680" height="280" fill="#0d1117" rx="4"/>

  <text x="340" y="28" fill="#39ff14" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">CONSISTENCY PROOF: "LOG ONLY GREW"</text>

  <!-- Left tree: checkpoint at size 4 -->
  <text x="150" y="58" fill="#666" font-size="10" text-anchor="middle">Checkpoint @ size 4</text>

  <!-- Root old -->
  <circle cx="150" cy="88" r="13" fill="none" stroke="#39ff14" stroke-width="2" filter="url(#gg)"/>
  <text x="150" y="92" fill="#39ff14" font-size="7" text-anchor="middle">root</text>
  <!-- Level 1 -->
  <line x1="142" y1="101" x2="110" y2="125" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/>
  <line x1="158" y1="101" x2="190" y2="125" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/>
  <circle cx="110" cy="133" r="10" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.7"/>
  <text x="110" y="137" fill="#39ff14" font-size="6" text-anchor="middle">h01</text>
  <circle cx="190" cy="133" r="10" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.7"/>
  <text x="190" y="137" fill="#39ff14" font-size="6" text-anchor="middle">h23</text>
  <!-- Leaves -->
  <line x1="104" y1="143" x2="88" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="116" y1="143" x2="132" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="184" y1="143" x2="168" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="196" y1="143" x2="212" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <rect x="76" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="88" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e0</text>
  <rect x="120" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="132" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e1</text>
  <rect x="156" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="168" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e2</text>
  <rect x="200" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="212" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e3</text>

  <!-- Arrow -->
  <line x1="270" y1="130" x2="340" y2="130" stroke="#ffe600" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="340,125 352,130 340,135" fill="#ffe600"/>
  <text x="305" y="120" fill="#ffe600" font-size="9" text-anchor="middle">append</text>

  <!-- Right tree: size 6 -->
  <text x="490" y="58" fill="#666" font-size="10" text-anchor="middle">Current @ size 6</text>

  <!-- New root -->
  <circle cx="460" cy="88" r="13" fill="none" stroke="#39ff14" stroke-width="2" filter="url(#gg)"/>
  <text x="460" y="92" fill="#39ff14" font-size="7" text-anchor="middle">root'</text>
  <!-- Level 1 -->
  <line x1="452" y1="101" x2="420" y2="125" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/>
  <line x1="468" y1="101" x2="530" y2="125" stroke="#ffe600" stroke-width="1.5" opacity="0.8"/>
  <!-- Old subtree (preserved) -->
  <circle cx="420" cy="133" r="10" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.7"/>
  <text x="420" y="137" fill="#39ff14" font-size="6" text-anchor="middle">h01</text>
  <!-- Old h23 preserved -->
  <line x1="414" y1="143" x2="398" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="426" y1="143" x2="442" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <rect x="386" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="398" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e0</text>
  <rect x="430" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="442" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e1</text>

  <!-- New subtree -->
  <circle cx="530" cy="133" r="10" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="530" y="137" fill="#ffe600" font-size="6" text-anchor="middle">h2+</text>
  <line x1="524" y1="143" x2="508" y2="158" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="536" y1="143" x2="552" y2="158" stroke="#ffe600" stroke-width="1" opacity="0.6"/>
  <rect x="496" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="508" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e2</text>
  <rect x="540" y="162" width="24" height="18" rx="2" fill="none" stroke="#39ff14" stroke-width="1.2"/>
  <text x="552" y="174" fill="#39ff14" font-size="7" text-anchor="middle">e3</text>

  <!-- New events -->
  <rect x="580" y="133" width="24" height="18" rx="2" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="592" y="145" fill="#ffe600" font-size="7" text-anchor="middle">e4</text>
  <text x="592" y="158" fill="#ffe600" font-size="7" text-anchor="middle" opacity="0.6">NEW</text>
  <rect x="612" y="133" width="24" height="18" rx="2" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="624" y="145" fill="#ffe600" font-size="7" text-anchor="middle">e5</text>
  <text x="624" y="158" fill="#ffe600" font-size="7" text-anchor="middle" opacity="0.6">NEW</text>

  <!-- Bottom annotation -->
  <rect x="100" y="210" width="480" height="55" rx="3" fill="rgba(57,255,20,0.04)" stroke="rgba(57,255,20,0.15)" stroke-width="1"/>
  <text x="340" y="230" fill="#39ff14" font-size="10" text-anchor="middle">Consistency proof guarantees:</text>
  <text x="340" y="248" fill="#e0e0e0" font-size="10" text-anchor="middle">e0..e3 are identical in both trees. Only e4, e5 were appended.</text>
</svg>
