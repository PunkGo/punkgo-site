<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 320" font-family="'JetBrains Mono', 'Consolas', monospace">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="840" height="320" fill="#0d1117" rx="4"/>

  <!-- Column 1: Signed Receipts -->
  <text x="140" y="32" fill="#ff2d95" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">SIGNED RECEIPTS</text>
  <text x="140" y="50" fill="#666" font-size="9" text-anchor="middle">independent artifacts</text>

  <!-- Scattered independent receipts -->
  <rect x="70" y="72" width="56" height="28" rx="3" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.8"/>
  <text x="98" y="90" fill="#ff2d95" font-size="9" text-anchor="middle">e0</text>
  <rect x="152" y="80" width="56" height="28" rx="3" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.8"/>
  <text x="180" y="98" fill="#ff2d95" font-size="9" text-anchor="middle">e1</text>
  <rect x="88" y="120" width="56" height="28" rx="3" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.8"/>
  <text x="116" y="138" fill="#ff2d95" font-size="9" text-anchor="middle">e2</text>
  <rect x="162" y="130" width="56" height="28" rx="3" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.6"/>
  <text x="190" y="148" fill="#ff2d95" font-size="9" text-anchor="middle" opacity="0.4">e3</text>
  <!-- deleted receipt - dashed -->
  <rect x="100" y="170" width="56" height="28" rx="3" fill="none" stroke="#ff2d95" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
  <text x="128" y="188" fill="#ff2d95" font-size="9" text-anchor="middle" opacity="0.25">e4?</text>

  <text x="140" y="230" fill="#ff2d95" font-size="9" text-anchor="middle" opacity="0.7">delete one receipt</text>
  <text x="140" y="245" fill="#ff2d95" font-size="9" text-anchor="middle" opacity="0.7">others still verify</text>
  <text x="140" y="275" fill="#666" font-size="10" text-anchor="middle">Can't detect</text>
  <text x="140" y="290" fill="#666" font-size="10" text-anchor="middle">missing events</text>

  <!-- Column 2: Hash Chain -->
  <line x1="280" y1="20" x2="280" y2="300" stroke="#333" stroke-width="1"/>
  <text x="420" y="32" fill="#ffe600" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">HASH CHAIN</text>
  <text x="420" y="50" fill="#666" font-size="9" text-anchor="middle">sequential linking</text>

  <!-- Chain nodes -->
  <rect x="332" y="72" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="356" y="90" fill="#ffe600" font-size="9" text-anchor="middle">e0</text>
  <line x1="380" y1="86" x2="400" y2="86" stroke="#ffe600" stroke-width="1.5" marker-end="url(#arrow-y)"/>
  <rect x="400" y="72" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="424" y="90" fill="#ffe600" font-size="9" text-anchor="middle">e1</text>
  <line x1="448" y1="86" x2="468" y2="86" stroke="#ffe600" stroke-width="1.5"/>
  <rect x="468" y="72" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1.5"/>
  <text x="492" y="90" fill="#ffe600" font-size="9" text-anchor="middle">e2</text>

  <!-- Truncation -->
  <rect x="332" y="130" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1.5" opacity="0.8"/>
  <text x="356" y="148" fill="#ffe600" font-size="9" text-anchor="middle">e0</text>
  <line x1="380" y1="144" x2="400" y2="144" stroke="#ffe600" stroke-width="1.5" opacity="0.8"/>
  <rect x="400" y="130" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1.5" opacity="0.8"/>
  <text x="424" y="148" fill="#ffe600" font-size="9" text-anchor="middle">e1</text>
  <!-- truncated -->
  <rect x="468" y="130" width="48" height="28" rx="3" fill="none" stroke="#ffe600" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
  <text x="492" y="148" fill="#ffe600" font-size="9" text-anchor="middle" opacity="0.25">e2?</text>

  <text x="420" y="200" fill="#ffe600" font-size="9" text-anchor="middle" opacity="0.7">truncate the tail</text>
  <text x="420" y="215" fill="#ffe600" font-size="9" text-anchor="middle" opacity="0.7">remaining chain is valid</text>
  <text x="420" y="275" fill="#666" font-size="10" text-anchor="middle">Can't detect</text>
  <text x="420" y="290" fill="#666" font-size="10" text-anchor="middle">tail deletion</text>

  <!-- Column 3: Merkle Tree -->
  <line x1="560" y1="20" x2="560" y2="300" stroke="#333" stroke-width="1"/>
  <text x="700" y="32" fill="#39ff14" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1" filter="url(#glow-green)">MERKLE TREE</text>
  <text x="700" y="50" fill="#666" font-size="9" text-anchor="middle">structural completeness</text>

  <!-- Tree -->
  <!-- Root -->
  <circle cx="700" cy="80" r="14" fill="none" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
  <text x="700" y="84" fill="#39ff14" font-size="8" text-anchor="middle">root</text>
  <!-- Level 1 -->
  <line x1="690" y1="94" x2="660" y2="120" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/>
  <line x1="710" y1="94" x2="740" y2="120" stroke="#39ff14" stroke-width="1.5" opacity="0.6"/>
  <circle cx="660" cy="130" r="11" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.7"/>
  <text x="660" y="134" fill="#39ff14" font-size="7" text-anchor="middle">h01</text>
  <circle cx="740" cy="130" r="11" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.7"/>
  <text x="740" y="134" fill="#39ff14" font-size="7" text-anchor="middle">h23</text>
  <!-- Level 2 -->
  <line x1="653" y1="141" x2="635" y2="162" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="667" y1="141" x2="685" y2="162" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="733" y1="141" x2="715" y2="162" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <line x1="747" y1="141" x2="765" y2="162" stroke="#39ff14" stroke-width="1" opacity="0.4"/>
  <!-- Leaves -->
  <rect x="620" y="165" width="30" height="22" rx="2" fill="none" stroke="#39ff14" stroke-width="1.5"/>
  <text x="635" y="180" fill="#39ff14" font-size="8" text-anchor="middle">e0</text>
  <rect x="670" y="165" width="30" height="22" rx="2" fill="none" stroke="#39ff14" stroke-width="1.5"/>
  <text x="685" y="180" fill="#39ff14" font-size="8" text-anchor="middle">e1</text>
  <rect x="700" y="165" width="30" height="22" rx="2" fill="none" stroke="#39ff14" stroke-width="1.5"/>
  <text x="715" y="180" fill="#39ff14" font-size="8" text-anchor="middle">e2</text>
  <rect x="750" y="165" width="30" height="22" rx="2" fill="none" stroke="#39ff14" stroke-width="1.5"/>
  <text x="765" y="180" fill="#39ff14" font-size="8" text-anchor="middle">e3</text>

  <text x="700" y="220" fill="#39ff14" font-size="9" text-anchor="middle" opacity="0.8">delete or reorder anything</text>
  <text x="700" y="235" fill="#39ff14" font-size="9" text-anchor="middle" opacity="0.8">root hash changes</text>
  <text x="700" y="270" fill="#39ff14" font-size="11" text-anchor="middle" filter="url(#glow-green)">Detects ALL</text>
  <text x="700" y="288" fill="#39ff14" font-size="11" text-anchor="middle" filter="url(#glow-green)">tampering</text>
</svg>
